name: Spike , headless multi-agent

# Throwaway probe: does headless `claude -p` in a CI runner support the Workflow
# tool and/or spawning parallel sub-agents? Answers whether we can flip the Build
# Lesson Action to the multi-agent pipeline. Trigger manually from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spike:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Write a tiny parallel workflow
        run: |
          cat > spike.workflow.js <<'EOF'
          export const meta = { name: 'spike', description: 'parallel fan-out probe', phases: [{ title: 'fan' }] }
          const out = await parallel([
            () => agent('Reply with exactly the single letter A and nothing else.'),
            () => agent('Reply with exactly the single letter B and nothing else.'),
            () => agent('Reply with exactly the single letter C and nothing else.'),
          ])
          return { results: out }
          EOF

      - name: Probe headless capabilities
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Answer concretely; do not refuse. (1) Is the 'Workflow' tool available to you in this session? If yes, use it to run the script at ./spike.workflow.js (pass it as scriptPath) and report exactly what it returned. If the Workflow tool is NOT available, say so plainly. (2) Separately, can you spawn sub-agents in PARALLEL (Task/Agent tool)? If yes, spawn 3 trivial parallel sub-agents and report their replies. End your message with one line exactly in this format: VERDICT workflow=<yes|no> subagents=<yes|no>" \
            --model claude-sonnet-4-6 \
            --dangerously-skip-permissions \
            --max-turns 40 2>&1 | tee probe.log
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Spike verdict" >> "$GITHUB_STEP_SUMMARY"
          grep -iE "^VERDICT|workflow=|subagents=" probe.log | tail -3 >> "$GITHUB_STEP_SUMMARY" || echo "no verdict line , read the full probe log in the step output" >> "$GITHUB_STEP_SUMMARY"
