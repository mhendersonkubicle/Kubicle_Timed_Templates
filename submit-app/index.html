<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lesson Video Pipeline</title>
  <style>
    :root { --bg:#0b1f33; --card:#fff; --ink:#0b1f33; --muted:#5b6b7a; --accent:#1e90ff; --ok:#1a7f37; --err:#c0392b; --line:#e1e8ef; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width: 640px; margin: 0 auto; padding: 28px 20px 64px; }
    h1 { color:#fff; font-size: 1.4rem; margin: 4px 0 2px; }
    .sub { color:#9db4c9; margin: 0 0 18px; font-size: .88rem; }
    .codebar { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
    .codebar label { color:#cfe0ef; font-size:.82rem; font-weight:600; white-space:nowrap; }
    .codebar input { flex:1; padding:9px 11px; border:1px solid #2c4a66; border-radius:8px; }
    .tabs { display:flex; gap:6px; margin-bottom:0; }
    .tab { padding:10px 16px; border:0; border-radius:10px 10px 0 0; background:#13314d; color:#9db4c9; font-weight:700; cursor:pointer; font-size:.92rem; }
    .tab.active { background:var(--card); color:var(--ink); }
    .card { background:var(--card); border-radius:0 14px 14px 14px; padding:22px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    label { display:block; font-weight:600; font-size:.82rem; margin: 14px 0 6px; }
    input[type=text], input[type=number], input[type=password], input[type=email], textarea, select {
      width:100%; padding:10px 12px; border:1px solid #cdd6df; border-radius:9px; font-size:1rem; font-family:inherit; }
    textarea { min-height:56px; resize:vertical; }
    input[type=file] { width:100%; padding:9px; border:1px dashed #aebeca; border-radius:9px; background:#f6f9fc; }
    .row { display:flex; gap:12px; } .row > div { flex:1; }
    button.go { margin-top:20px; width:100%; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:1rem; font-weight:700; cursor:pointer; }
    button.go:disabled { opacity:.6; cursor:default; }
    #status { margin-top:14px; font-size:.88rem; white-space:pre-wrap; }
    .ok { color:var(--ok); } .err { color:var(--err); } .muted { color:var(--muted); }
    .hint { color:var(--muted); font-size:.76rem; margin-top:4px; }
    .reqhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .reqhead button { padding:7px 12px; border:1px solid var(--line); background:#f6f9fc; border-radius:8px; cursor:pointer; font-weight:600; }
    .req { border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:10px; }
    .req .t { font-weight:700; }
    .req .m { color:var(--muted); font-size:.8rem; margin-top:2px; }
    .badge { display:inline-block; padding:3px 9px; border-radius:999px; font-size:.72rem; font-weight:700; }
    .b-building { background:#fff3cd; color:#856404; }
    .b-ready { background:#dbeafe; color:#1e40af; }
    .b-delivered { background:#d4f7dd; color:#1a7f37; }
    .b-error { background:#fde2e1; color:#c0392b; }
    .collect.err { color:#c0392b; }
    .dl { display:inline-block; margin-top:8px; padding:7px 12px; background:var(--ok); color:#fff; border-radius:8px; text-decoration:none; font-weight:700; font-size:.85rem; }
    .collect { margin-top:8px; font-size:.8rem; color:var(--muted); line-height:1.7; }
    .collect code { background:#f0f4f8; border:1px solid var(--line); border-radius:5px; padding:2px 6px; font-size:.82em; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Lesson Video Pipeline</h1>
    <p class="sub">Internal tool. Submit a lesson, then track and download it in Requests.</p>

    <div class="codebar">
      <label for="code">Access code</label>
      <input type="password" id="code" autocomplete="off" placeholder="team access code" />
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-submit">Submit</button>
      <button class="tab" id="tab-requests">Requests</button>
    </div>

    <!-- SUBMIT -->
    <div class="card" id="panel-submit">
      <form id="f">
        <label>Your name or email <span class="muted">(so we know who to deliver to)</span></label>
        <input type="text" id="submitter" placeholder="you@kubicle.com" required />

        <label>Course name <span class="muted">(exact, used on every lesson)</span></label>
        <input type="text" id="course" placeholder="Marketing in Professional Services" required />

        <label>Lesson number</label>
        <input type="number" id="lnum" min="1" step="1" placeholder="1" required />

        <label>Lesson title</label>
        <input type="text" id="ltitle" placeholder="Core Principles of Marketing" required />

        <label>Requirements <span class="muted">(optional)</span></label>
        <textarea id="req" placeholder="e.g. case study company is FinSage"></textarea>

        <label>Subtitles file (.srt)</label>
        <input type="file" id="srt" accept=".srt" required />

        <label>Audio file (.mp3)</label>
        <input type="file" id="mp3" accept=".mp3,audio/mpeg" required />
        <div class="hint">Files upload straight to storage, so size is not a problem.</div>

        <button type="submit" class="go" id="go">Build lesson</button>
        <div id="status" class="muted"></div>
      </form>
    </div>

    <!-- REQUESTS -->
    <div class="card hidden" id="panel-requests">
      <div class="reqhead">
        <span class="muted" id="reqcount">Enter the access code, then Refresh.</span>
        <button id="refresh">Refresh</button>
      </div>
      <div id="reqlist"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fn = (name, body) => fetch('/.netlify/functions/' + name, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ accessCode: $('code').value.trim(), ...body }),
    }).then((r) => r.json());

    // ---- tabs ----
    const showTab = (which) => {
      $('tab-submit').classList.toggle('active', which === 'submit');
      $('tab-requests').classList.toggle('active', which === 'requests');
      $('panel-submit').classList.toggle('hidden', which !== 'submit');
      $('panel-requests').classList.toggle('hidden', which !== 'requests');
      if (which === 'requests') loadRequests();
    };
    $('tab-submit').onclick = () => showTab('submit');
    $('tab-requests').onclick = () => showTab('requests');

    // ---- submit ----
    const setStatus = (msg, cls = 'muted') => { const s = $('status'); s.className = cls; s.textContent = msg; };
    async function uploadTo(url, file) {
      const r = await fetch(url, { method: 'PUT', body: file });
      if (!r.ok) throw new Error('Upload failed (' + r.status + '). Check the storage CORS settings.');
    }
    $('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const go = $('go'); go.disabled = true;
      try {
        if (!$('code').value.trim()) { setStatus('Enter the access code at the top.', 'err'); go.disabled = false; return; }
        const srtFile = $('srt').files[0], mp3File = $('mp3').files[0];
        if (!srtFile || !mp3File) { setStatus('Attach both files.', 'err'); go.disabled = false; return; }

        setStatus('Requesting upload links...');
        const p = await fn('presign', { files: [{ name: 'lesson.srt' }, { name: 'narration.mp3' }] });
        if (p.error) { setStatus('Error: ' + p.error, 'err'); go.disabled = false; return; }

        setStatus('Uploading subtitles...'); await uploadTo(p.files[0].putUrl, srtFile);
        setStatus('Uploading audio...'); await uploadTo(p.files[1].putUrl, mp3File);

        setStatus('Starting build...');
        const res = await fn('submit', {
          submitter: $('submitter').value.trim(),
          course: $('course').value.trim(),
          lessonNumber: $('lnum').value.trim(),
          lessonTitle: $('ltitle').value.trim(),
          requirements: $('req').value.trim(),
          srtUrl: p.files[0].getUrl,
          mp3Url: p.files[1].getUrl,
        });
        if (res.error) { setStatus('Error: ' + res.error + (res.detail ? '\n' + res.detail : ''), 'err'); go.disabled = false; return; }

        setStatus('Build started for "' + $('ltitle').value.trim() + '". Track it in the Requests tab.', 'ok');
        $('f').reset();
      } catch (err) { setStatus('Error: ' + err.message, 'err'); }
      finally { go.disabled = false; }
    });

    // ---- requests ----
    const badge = (s) => ({
      building: '<span class="badge b-building">Building</span>',
      ready: '<span class="badge b-ready">Ready to render</span>',
      delivered: '<span class="badge b-delivered">Delivered</span>',
      error: '<span class="badge b-error">Error</span>',
    }[s] || s);

    async function loadRequests() {
      if (!$('code').value.trim()) { $('reqcount').textContent = 'Enter the access code at the top, then Refresh.'; return; }
      $('reqcount').textContent = 'Loading...';
      const res = await fn('list', {});
      if (res.error) { $('reqcount').textContent = 'Error: ' + res.error; $('reqlist').innerHTML = ''; return; }
      const rows = res.requests || [];
      $('reqcount').textContent = rows.length + ' request' + (rows.length === 1 ? '' : 's');
      $('reqlist').innerHTML = rows.map((r) => `
        <div class="req">
          <div class="t">${r.lessonTitle || r.id} ${badge(r.status)}</div>
          <div class="m">${r.course} · Lesson ${r.lessonNumber}${r.submitter ? ' · ' + r.submitter : ''}${r.submittedAt ? ' · ' + new Date(r.submittedAt).toLocaleString() : ''}</div>
          ${r.status === 'building' ? `<div class="collect muted">Building, check back in a few minutes.</div>` : ''}
          ${r.status === 'ready' ? `<div class="collect">Ready to collect locally:<br><code>git pull</code><br><code>python script-pipeline/open-in-studio.py ${r.id}</code><br>Then preview &amp; export in your browser.</div>` : ''}
          ${r.status === 'error' ? `<div class="collect err">Build failed.${r.runUrl ? ` <a href="${r.runUrl}" target="_blank">View the log</a>.` : ''} Fix and re-submit.</div>` : ''}
          ${r.downloadUrl ? `<a class="dl" href="${r.downloadUrl}">Download video</a>` : ''}
        </div>`).join('');
    }
    $('refresh').onclick = loadRequests;
  </script>
</body>
</html>
