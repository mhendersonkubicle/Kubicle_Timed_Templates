<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build a Lesson</title>
  <style>
    :root { --bg:#0b1f33; --card:#fff; --ink:#0b1f33; --muted:#5b6b7a; --accent:#1e90ff; --ok:#1a7f37; --err:#c0392b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { color:#fff; font-size: 1.5rem; margin: 8px 0 4px; }
    .sub { color:#9db4c9; margin: 0 0 24px; font-size: .9rem; }
    .card { background:var(--card); border-radius:14px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.25); }
    label { display:block; font-weight:600; font-size:.85rem; margin: 16px 0 6px; }
    input[type=text], input[type=number], input[type=password], textarea, select {
      width:100%; padding:11px 12px; border:1px solid #cdd6df; border-radius:9px; font-size:1rem; font-family:inherit; }
    textarea { min-height:64px; resize:vertical; }
    input[type=file] { width:100%; padding:10px; border:1px dashed #aebeca; border-radius:9px; background:#f6f9fc; }
    .row { display:flex; gap:12px; } .row > div { flex:1; }
    button { margin-top:22px; width:100%; padding:13px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:1rem; font-weight:700; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    #status { margin-top:16px; font-size:.9rem; white-space:pre-wrap; }
    .ok { color:var(--ok); } .err { color:var(--err); } .muted { color:var(--muted); }
    .hint { color:var(--muted); font-size:.78rem; margin-top:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Build a Lesson</h1>
    <p class="sub">Internal tool. Fill in the lesson, attach the subtitles and audio, and submit. The build runs automatically; pull the repo and render locally when it's done.</p>
    <div class="card">
      <form id="f">
        <label>Access code</label>
        <input type="password" id="code" autocomplete="off" required />

        <label>Course name <span class="muted">(exact, used on every lesson)</span></label>
        <input type="text" id="course" placeholder="Marketing in Professional Services" required />

        <div class="row">
          <div>
            <label>Lesson number</label>
            <input type="number" id="lnum" min="1" step="1" placeholder="1" required />
          </div>
          <div>
            <label>Model</label>
            <select id="model">
              <option value="claude-sonnet-4-6">Sonnet (cheaper)</option>
              <option value="claude-opus-4-8">Opus (higher quality)</option>
            </select>
          </div>
        </div>

        <label>Lesson title</label>
        <input type="text" id="ltitle" placeholder="Core Principles of Marketing" required />

        <label>Requirements <span class="muted">(optional)</span></label>
        <textarea id="req" placeholder="e.g. case study company is FinSage"></textarea>

        <label>Subtitles file (.srt)</label>
        <input type="file" id="srt" accept=".srt" required />

        <label>Audio file (.mp3)</label>
        <input type="file" id="mp3" accept=".mp3,audio/mpeg" required />
        <div class="hint">Files upload straight to storage, so size is not a problem.</div>

        <button type="submit" id="go">Build lesson</button>
        <div id="status" class="muted"></div>
      </form>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const setStatus = (msg, cls = 'muted') => { const s = $('status'); s.className = cls; s.textContent = msg; };

    async function presign(accessCode, names) {
      const r = await fetch('/.netlify/functions/presign', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ accessCode, files: names.map((n) => ({ name: n })) }),
      });
      return r.json();
    }

    async function uploadTo(url, file) {
      const r = await fetch(url, { method: 'PUT', body: file });
      if (!r.ok) throw new Error('Upload failed (' + r.status + '). Check the storage CORS settings.');
    }

    $('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const go = $('go'); go.disabled = true;
      try {
        const accessCode = $('code').value.trim();
        const srtFile = $('srt').files[0], mp3File = $('mp3').files[0];
        if (!srtFile || !mp3File) { setStatus('Attach both files.', 'err'); go.disabled = false; return; }

        setStatus('Requesting upload links...');
        const p = await presign(accessCode, ['lesson.srt', 'narration.mp3']);
        if (p.error) { setStatus('Error: ' + p.error, 'err'); go.disabled = false; return; }

        setStatus('Uploading subtitles...');
        await uploadTo(p.files[0].putUrl, srtFile);
        setStatus('Uploading audio...');
        await uploadTo(p.files[1].putUrl, mp3File);

        setStatus('Starting build...');
        const r = await fetch('/.netlify/functions/submit', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            accessCode,
            course: $('course').value.trim(),
            lessonNumber: $('lnum').value.trim(),
            lessonTitle: $('ltitle').value.trim(),
            requirements: $('req').value.trim(),
            model: $('model').value,
            srtUrl: p.files[0].getUrl,
            mp3Url: p.files[1].getUrl,
          }),
        });
        const res = await r.json();
        if (res.error) { setStatus('Error: ' + res.error + (res.detail ? '\n' + res.detail : ''), 'err'); go.disabled = false; return; }

        setStatus('Build started for "' + $('ltitle').value.trim() + '".\nIt will appear at projects/' + res.courseId + '-l' + $('lnum').value.trim() + '/ in a few minutes. Pull the repo and render locally.', 'ok');
        $('f').reset();
      } catch (err) {
        setStatus('Error: ' + err.message, 'err');
      } finally {
        go.disabled = false;
      }
    });
  </script>
</body>
</html>
